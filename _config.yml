# Site settings
title: Fruch's Blog
description: >-
  Personal blog by Israel Fruchter — Python, DevOps, open source,
  and thoughts from the trenches of software engineering.
url: https://fruch.github.io
baseurl: ""
repository: fruch/fruch.github.com

# Remote theme (Minimal Mistakes)
remote_theme: mmistakes/minimal-mistakes@4.26.2

# Permalink structure
permalink: /:categories/:year/:month/:day/:title

# Build settings
highlighter: rouge
markdown: kramdown

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-include-cache
  - jekyll-remote-theme

# Exclude from build
exclude:
  - .rvmrc
  - .rbenv-version
  - README.md
  - Rakefile
  - changelog.md
  - docs
  - vendor
  - Gemfile
  - Gemfile.lock

# Author information
author:
  name: Israel Fruchter
  bio: >-
    Software engineer, Python enthusiast, and open-source contributor.
    Writing about Python, DevOps, and the craft of software engineering.
  avatar: https://avatars.githubusercontent.com/u/820874
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/fruch"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter"
      url: "https://twitter.com/IsraelFruchter"
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:israel.fruchter@gmail.com"

# Site footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/fruch"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter"
      url: "https://twitter.com/IsraelFruchter"

# Reading and display
locale: en-US
words_per_minute: 200

# Defaults
defaults:
  # Posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
      show_date: true
  # Pages
  - scope:
      path: ""
    values:
      layout: single
      author_profile: true

